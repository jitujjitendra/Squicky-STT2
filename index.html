<!DOCTYPE html>
<html lang="en" data-theme="stt2">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squicky STT2 - Speech to Text</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Squicky Logo.png" type="image/png">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <img src="Squicky Logo.png" alt="Squicky" class="logo">
                <span class="brand-name">Squicky <span class="accent-text">STT2</span></span>
            </div>
            <div class="theme-switcher">
                <button class="theme-btn" data-theme="stt1">STT1</button>
                <button class="theme-btn active" data-theme="stt2">STT2</button>
                <button class="theme-btn" data-theme="stt3">STT3</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Language Select -->
            <div class="language-wrapper">
                <select id="languageSelect">
                    <option value="en-US">English (US)</option>
                    <option value="en-IN">English (India)</option>
                    <option value="hi-IN">Hindi</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="de-DE">German</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="zh-CN">Chinese</option>
                </select>
            </div>

            <!-- Mic Button -->
            <div class="mic-section">
                <button class="mic-btn" id="micBtn" aria-label="Start recording">
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                    <div class="pulse-ring"></div>
                </button>
                <p class="status-text" id="statusText">Tap to record</p>
            </div>

            <!-- Transcript Box -->
            <div class="transcript-box" id="transcriptBox">
                <p class="transcript-placeholder" id="placeholder">Your speech will appear here...</p>
                <p class="transcript-text" id="finalText"></p>
                <p class="transcript-interim" id="interimText"></p>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button class="action-btn" id="copyBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    <span>Copy</span>
                </button>
                <button class="action-btn" id="downloadBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    <span>Download</span>
                </button>
                <button class="action-btn" id="clearBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    <span>Clear</span>
                </button>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
